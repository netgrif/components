name: Build
on:
    pull_request:
        types: [ opened, synchronize, reopened ]
jobs:
    matrix-test:
        name: Matrix Test
        runs-on: ubuntu-24.04
        strategy:
            matrix:
                node-version: [ 20, 22, 24 ]
        steps:
            -   uses: actions/checkout@v4
                with:
                    fetch-depth: 0
            -   uses: actions/setup-node@v4
                name: Full Test on Node.js version ${{ matrix.node-version }}
                with:
                    node-version: ${{ matrix.node-version }}
            -   name: Install dependencies (bez Chromium)
                run: npm install --legacy-peer-deps --verbose
                env:
                    PUPPETEER_SKIP_DOWNLOAD: 'true'
            -   name: Install dependencies with timeout and diagnostics
                run: |
                    npm install --legacy-peer-deps --verbose &
                    pid=$!
                    for i in {1..5}; do
                      if ! kill -0 $pid 2>/dev/null; then
                        break
                      fi
                      echo "Still installing... ($i min)"
                      sleep 60
                    done
                    if kill -0 $pid 2>/dev/null; then
                      echo "npm install is stuck, killing process..."
                      ps aux
                      pstree -p $pid || true
                      kill -9 $pid
                      exit 1
                    fi
                    wait $pid
                    exit_code=$?
                    if [ $exit_code -eq 0 ]; then
                      echo "npm install completed successfully (exit code: $exit_code)"
                    else
                      echo "npm install FAILED with exit code $exit_code"
                    fi
                    exit $exit_code
            -   name: Debug
                run: |
                    ps aux
                    pstree -p
                    lsof -p $pid || true
            -   name: Build & test components-core
                run: |
                    npm run ncc:build
                    npm run ncc:full-test
                    npm i ./dist/netgrif-components-core --save-optional --legacy-peer-deps
            -   name: Build & test components
                run: |
                    npm run nc:build
                    npm run nc:full-test
                    npm i ./dist/netgrif-components --save-optional --legacy-peer-deps
            -   name: Build examples
                run: npm run example:build
    test:
        name: Test with SonarCloud
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4
                with:
                    fetch-depth: 0
            -   uses: actions/setup-node@v4
                name: Full Test
                with:
                    node-version: 20
            -   run: npm i --legacy-peer-deps
            -   name: Build & test components-core
                run: |
                    npm run ncc:build
                    npm run ncc:full-test
                    npm i ./dist/netgrif-components-core --save-optional --legacy-peer-deps
            -   name: Build & test components
                run: |
                    npm run nc:build
                    npm run nc:full-test
                    npm i ./dist/netgrif-components --save-optional --legacy-peer-deps
            -   name: Edit Path
                run: |
                    sed -i 's/SF:.*.projects/SF:projects/g' coverage/netgrif-components/lcov.info
                    sed -i 's/SF:.*.projects/SF:projects/g' coverage/netgrif-components-core/lcov.info
            -   name: SonarCloud scan
                uses: SonarSource/sonarcloud-github-action@master
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                    SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
            -   name: Build examples
                run: npm run example:build
