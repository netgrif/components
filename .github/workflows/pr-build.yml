name: Build
on:
    pull_request:
        types: [ opened, synchronize, reopened ]
jobs:
    matrix-test:
        name: Matrix Test
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [ 20, 22, 24 ]
        steps:
            -   uses: actions/checkout@v4
                with:
                    fetch-depth: 0
            -   uses: actions/setup-node@v4
                name: Full Test on Node.js version ${{ matrix.node-version }}
                with:
                    node-version: ${{ matrix.node-version }}
            -   name: Install dependencies with status output
                run: |
                    npm install --legacy-peer-deps --verbose &
                    pid=$!
                    while kill -0 $pid 2> /dev/null; do
                      echo "Still installing..."; sleep 60
                    done
                    wait $pid
                    exit_code=$?
                    if [ $exit_code -eq 0 ]; then
                      echo "npm install completed successfully (exit code: $exit_code)"
                    else
                      echo "npm install FAILED with exit code $exit_code"
                    fi
                    exit $exit_code
            -   name: Build & test components-core
                run: |
                    npm run ncc:build
                    npm run ncc:full-test
                    npm i ./dist/netgrif-components-core --save-optional --legacy-peer-deps
            -   name: Build & test components
                run: |
                    npm run nc:build
                    npm run nc:full-test
                    npm i ./dist/netgrif-components --save-optional --legacy-peer-deps
            -   name: Build examples
                run: npm run example:build
    test:
        name: Test with SonarCloud
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4
                with:
                    fetch-depth: 0
            -   uses: actions/setup-node@v4
                name: Full Test
                with:
                    node-version: 20
            -   run: npm i --legacy-peer-deps
            -   name: Build & test components-core
                run: |
                    npm run ncc:build
                    npm run ncc:full-test
                    npm i ./dist/netgrif-components-core --save-optional --legacy-peer-deps
            -   name: Build & test components
                run: |
                    npm run nc:build
                    npm run nc:full-test
                    npm i ./dist/netgrif-components --save-optional --legacy-peer-deps
            -   name: Edit Path
                run: |
                    sed -i 's/SF:.*.projects/SF:projects/g' coverage/netgrif-components/lcov.info
                    sed -i 's/SF:.*.projects/SF:projects/g' coverage/netgrif-components-core/lcov.info
            -   name: SonarCloud scan
                uses: SonarSource/sonarcloud-github-action@master
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                    SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
            -   name: Build examples
                run: npm run example:build
